<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Application | LSG Global Health Careers</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        :root {
            --brand-green: #99CC33; 
            --brand-grey: #2D3436;  
            --soft-bg: #f8faf5;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--soft-bg);
            color: var(--brand-grey);
        }

        .apply-container {
            max-width: 800px;
            margin: 100px auto;
        }

        .form-card {
            background: white;
            padding: 50px;
            border-radius: 40px;
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 40px 80px rgba(0,0,0,0.05);
        }

        .form-label {
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            color: var(--brand-grey);
        }

        .form-control, .form-select {
            padding: 15px 20px;
            border-radius: 15px;
            border: 2px solid #eee;
            background: #fdfdfd;
            transition: 0.3s;
        }

        .form-control:focus {
            border-color: var(--brand-green);
            box-shadow: none;
            background: white;
        }

        /* --- Custom File Upload Box --- */
        .cv-upload-viewport {
            border: 2px dashed #ddd;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            background: #fafafa;
        }

        .cv-upload-viewport:hover {
            border-color: var(--brand-green);
            background: #f4f9e9;
        }

        .btn-apply-submit {
            background: var(--brand-grey);
            color: white;
            padding: 20px;
            border-radius: 20px;
            font-weight: 800;
            border: none;
            width: 100%;
            transition: 0.4s;
            margin-top: 20px;
        }

        .btn-apply-submit:hover {
            background: var(--brand-green);
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(153, 204, 51, 0.3);
        }

        .step-indicator {
            color: var(--brand-green);
            font-weight: 800;
            font-size: 0.8rem;
            display: block;
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            .apply-container { margin: 50px 20px; }
            .form-card { padding: 30px; }
        }
    </style>
</head>
<body>

    <div class="apply-container">
        <div class="text-center mb-5">
            <a href="career.html" class="text-decoration-none text-muted small fw-bold">
                <i class="bi bi-arrow-left me-2"></i> BACK TO CAREERS
            </a>
            <h1 class="fw-800 display-5 mt-3">Join the <span style="color: var(--brand-green);">Mission.</span></h1>
            <p class="text-secondary">Please fill in your details accurately. Our HR team will review your profile within 48 hours.</p>
        </div>

        <div class="form-card">
            <form action="#" method="POST" enctype="multipart/form-data">
                
                <div class="row g-4">
                    <div class="col-md-12">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" placeholder="John Doe" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control" placeholder="john@example.com" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Phone Number</label>
                        <input type="tel" class="form-control" placeholder="+234..." required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Date of Birth</label>
                        <input type="date" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Highest Qualification</label>
                        <select class="form-select" required>
                            <option value="" selected disabled>Select Qualification</option>
                            <option>Bachelor's Degree</option>
                            <option>Master's Degree</option>
                            <option>PhD / Doctorate</option>
                            <option>Diploma / Certification</option>
                            <option>MBBS / Medical Degree</option>
                        </select>
                    </div>

                    <div class="col-md-12">
                        <label class="form-label">Years of Relevant Experience</label>
                        <input type="number" class="form-control" placeholder="e.g. 5" min="0" required>
                    </div>

                    <div class="col-md-12">
                        <label class="form-label">Upload Curriculum Vitae (CV)</label>
                        <div class="cv-upload-viewport" onclick="document.getElementById('cvInput').click()">
                            <i class="bi bi-cloud-arrow-up display-4 text-muted"></i>
                            <p class="mt-2 mb-0 fw-bold">Click to upload or drag and drop</p>
                            <p class="small text-muted">PDF or Word files only (Max 5MB)</p>
                            <input type="file" id="cvInput" name="cv_file" style="display: none;" accept=".pdf,.doc,.docx" required onchange="updateFileName(this)">
                            <div id="file-name-display" class="mt-3 text-success fw-bold small"></div>
                        </div>
                    </div>

                    <div class="col-12">
                        <button type="submit" class="btn-apply-submit">
                            SUBMIT APPLICATION <i class="bi bi-chevron-right ms-2"></i>
                        </button>
                    </div>
                </div>
            </form>
        </div>
        
        <div class="text-center mt-4">
            <p class="small text-muted">By submitting, you agree to our <a href="#" class="text-success text-decoration-none fw-bold">Privacy Policy</a> regarding applicant data.</p>
        </div>
    </div>

    <script>
        // Simple function to show the name of the file selected
        function updateFileName(input) {
            const display = document.getElementById('file-name-display');
            if (input.files && input.files[0]) {
                display.innerHTML = `<i class="bi bi-check-circle-fill"></i> Selected: ${input.files[0].name}`;
            }
        }
    </script>

</body>
</html>
